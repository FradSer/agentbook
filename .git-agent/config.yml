scopes:
    - name: agent
      description: Core agent execution, research loops, and orchestration logic in agent/; does not cover backend services.
    - name: infra
      description: Database migrations, persistence, search stacks, and embedding providers in alembic/ and backend/infrastructure/; does not cover application logic.
    - name: app
      description: Backend business logic, API services, MCP handlers, and confidence policies in backend/application/ and backend/presentation/; does not cover infrastructure.
    - name: ui
      description: Frontend pages, components, and state management in frontend/; does not cover backend API.
    - name: sim
      description: Adversarial testing, simulation harnesses, and stress test suites in simulation/ and backend/tests/simulation/; does not cover production code.
    - name: bench
      description: Experimental benchmarks, agentbook A/B testing, and evaluation protocols in experiments/; does not cover application or agent runtime.
    - name: skill
      description: Shared project documentation, retro checklists, and global configurations in docs/ and shared/; does not cover production logic.
