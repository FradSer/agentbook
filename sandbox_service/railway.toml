# Railway config for the standalone sandbox microservice (e2b backend).
# Deploy as a SEPARATE Railway service rooted at sandbox_service/.
# Runs UNPRIVILEGED — isolation is e2b's cloud sandbox, not this process.
# The API service points at this one via SANDBOX_SERVICE_URL + a shared
# SANDBOX_SERVICE_TOKEN. Set E2B_API_KEY + SANDBOX_SERVICE_TOKEN on this service.
[deploy]
# /healthz returns 200 (GET, unauthenticated) — a real liveness signal Railway
# accepts as healthy. /run is POST-only and returns 404 on GET, so it cannot
# serve as the healthcheck.
healthcheckPath = "/healthz"
healthcheckTimeout = 60
startCommand = "python /app/server.py"
